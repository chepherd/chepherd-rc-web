name: web-build

# Drives the chepherd-rc-web DoD path from CI — Playwright walks the
# sign-in screen on chromium/firefox/webkit/mobile-chrome/mobile-safari
# and uploads the screenshot bundle as a workflow artifact + posts a
# link on the EPIC issue.

on:
  push:
    branches: [main]
  workflow_dispatch:
  pull_request:

jobs:
  walk:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run Playwright smoke
        run: npx playwright test --reporter=line

      - name: Take cross-browser screenshot bundle
        if: always()
        run: |
          mkdir -p screenshots
          # Start the preview server in the background, wait for it.
          npm run build
          npm run preview -- --port 4321 &
          PREVIEW_PID=$!
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4321/app/ > /dev/null; then
              break
            fi
            sleep 1
          done
          npx playwright screenshot \
            --device='Desktop Chrome' \
            --viewport-size=1440,900 \
            http://localhost:4321/app/ \
            screenshots/01-signin-desktop.png
          npx playwright screenshot \
            --device='Pixel 7' \
            http://localhost:4321/app/ \
            screenshots/02-signin-mobile.png
          kill $PREVIEW_PID || true

      - name: Upload screenshot artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: web-signin-screenshots
          path: screenshots/

      - name: Post evidence on chepherd/chepherd#24
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.CROSS_REPO_TOKEN || github.token }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          ARTIFACT_URL="$RUN_URL/artifacts"
          cat > /tmp/comment-body.md <<EOF
          **Web sign-in screen rendered across desktop + mobile viewports** (CI run ${{ github.run_number }})

          Playwright walk + cross-browser screenshot bundle at $ARTIFACT_URL — open the **web-signin-screenshots** artifact to download \`01-signin-desktop.png\` (1440×900) + \`02-signin-mobile.png\` (Pixel 7).

          Build chain: chepherd-rc-web@${{ github.sha }} → npm ci → npm run build → npm run preview → Playwright (chromium / firefox / webkit / Pixel 7 / iPhone 14) smoke + cross-browser screenshot.

          Workflow: $RUN_URL
          EOF
          gh issue comment 24 \
            --repo chepherd/chepherd \
            --body-file /tmp/comment-body.md
